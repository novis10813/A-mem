experiment_id: ollama_llama3.2-1b_robust_bm25_embedding_rerank_k10
dataset: data/locomo10.json

backend:
  name: ollama
  model: llama3.2:1b

construction:
  runs: 1
  keyword_pruning_mode: none
  embedding_model: all-MiniLM-L6-v2
  max_workers: 10

evaluation:
  cache_experiment_id: ollama_llama3.2-1b_none_rerank_k10
  qa_mode: robust
  qa_runs: 1
  retrieval_pipeline:
    final_k: 10
    stages:
      - type: bm25
        name: bm25_candidates
        top_k: 100
        query: similarity_query
      - type: embedding_rerank
        name: embedding_rerank
        top_k: 50
        query: similarity_query
      - type: cross_encoder
        name: cross_encoder_rerank
        top_k: 10
        query: original_question
        model: cross-encoder/ms-marco-MiniLM-L6-v2
        batch_size: 32

limits:
  ratio: 1.0

run:
  resume: true
